name: Consolidate request logs

on:
  schedule:
    # 03:00 UTC on the 1st of every month
    - cron: '0 3 1 * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  consolidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install huggingface_hub pandas pyarrow

      - name: Run consolidation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/consolidate_request_logs.py
