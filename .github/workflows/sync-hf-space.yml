name: Sync demo to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'betaearth/generate.py'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Space files
        run: |
          mkdir -p space/.streamlit
          cp demo/app.py space/app.py
          cp demo/.streamlit/config.toml space/.streamlit/config.toml

          # Strip the local-dev sys.path bootstrap — the Space installs
          # betaearth from PyPI so there's nothing to prepend to sys.path.
          sed -i '/^import sys$/d' space/app.py
          sed -i '/sys.path.insert/d' space/app.py

          # requirements.txt
          cat > space/requirements.txt << 'EOF'
          betaearth[generate]>=0.2.2
          streamlit-folium>=0.18
          folium>=0.15
          pandas>=1.3
          EOF

          # README with Space metadata
          cat > space/README.md << 'EOF'
          ---
          title: BetaEarth
          emoji: 🥕
          colorFrom: purple
          colorTo: yellow
          sdk: streamlit
          sdk_version: "1.45.1"
          app_file: app.py
          pinned: false
          license: cc-by-4.0
          short_description: Dense 10m geospatial embeddings from Sentinel
          ---
          EOF

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd space
          git init -b main
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote add hf https://mikonvergence:$HF_TOKEN@huggingface.co/spaces/asterisk-labs/betaearth
          git add -A
          git commit -m "sync from GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push hf main --force
